services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft
    environment:
      EULA: "TRUE"
      VERSION: "LATEST"
      TYPE: PAPER
      MEMORY: "4G"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
      DIFFICULTY: normal
      MODE: survival
      MOTD: "Mi servidor de Minecraft"
      MAX_PLAYERS: "10"
      VIEW_DISTANCE: "10"
      ONLINE_MODE: "false"
      ENFORCE_SECURE_PROFILE: "false"
      WHITELIST: "Player1,MineBot,Player2"
      ENFORCE_WHITELIST: "TRUE"
      OPS: "Player1,MineBot"
      SPAWN_PROTECTION: "0"
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
    ports:
      - "25565:25565"
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: "3.0"
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dokploy-network:
    external: true
