# Standalone Minecraft server (Paper + Geyser for Java + Bedrock)
# Run with: docker compose -f docker-compose.mc.yml up -d
# Exposes Java on 25565, Bedrock on 19132/udp
services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    environment:
      EULA: "TRUE"
      VERSION: "${MC_VERSION:-LATEST}"
      TYPE: "${MC_TYPE:-PAPER}"
      MEMORY: "${MC_MEMORY:-2G}"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
      DIFFICULTY: "${MC_DIFFICULTY:-normal}"
      MODE: "${MC_MODE:-survival}"
      MOTD: "${MC_MOTD:-Minecraft Server mc.alore.dev}"
      MAX_PLAYERS: "${MC_MAX_PLAYERS:-10}"
      VIEW_DISTANCE: "${MC_VIEW_DISTANCE:-10}"
      ONLINE_MODE: "false"
      ENFORCE_SECURE_PROFILE: "false"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      WHITELIST: "${MC_WHITELIST}"
      ENFORCE_WHITELIST: "false"
      OPS: "${MC_OPS}"
      SPAWN_PROTECTION: "0"
      RCON_CMDS_STARTUP: "gamerule minecraft:keep_inventory true"
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
        https://cdn.modrinth.com/data/OhduvhIc/versions/L4VqZYyJ/veinminer-paper-2.10.1%2B1.21.11.jar
        https://cdn.modrinth.com/data/axTqSWQA/versions/OiYxu4ab/advanced-portals-2.8.0-spigot.jar
    ports:
      - "25565:25565"
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 3
