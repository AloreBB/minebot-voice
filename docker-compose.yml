services:
  minebot:
    build: .
    container_name: minebot
    environment:
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ACCESS_PASSWORD: "${ACCESS_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      MINECRAFT_HOST: "${MINECRAFT_HOST:-minecraft}"
      MINECRAFT_PORT: "${MINECRAFT_PORT:-25565}"
      BOT_USERNAME: "${BOT_USERNAME:-MineBot}"
      NODE_ENV: "production"
    expose:
      - 3001
    networks:
      - dokploy-network
    restart: unless-stopped
    # deploy:                # Optional: uncomment to limit resources
    #   resources:
    #     limits:
    #       memory: 1G
    #       cpus: "2.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  dokploy-network:
    external: true
