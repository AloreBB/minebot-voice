services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft
    environment:
      EULA: "TRUE"
      VERSION: "1.21.1"
      TYPE: PAPER
      MEMORY: "2G"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
      DIFFICULTY: normal
      MODE: survival
      MOTD: "Mi servidor de Minecraft"
      MAX_PLAYERS: "10"
      VIEW_DISTANCE: "10"
      ONLINE_MODE: "false"
      WHITELIST: "Player1,MineBot"
      ENFORCE_WHITELIST: "TRUE"
      OPS: "Player1"
    ports:
      - "25565:25565"
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 2.5G
          cpus: "2.0"
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 2m
      interval: 30s
      timeout: 10s
      retries: 3

  minebot:
    build: .
    container_name: minebot
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ACCESS_PASSWORD: "${ACCESS_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      MINECRAFT_HOST: "minecraft"
      MINECRAFT_PORT: "25565"
      BOT_USERNAME: "MineBot"
      NODE_ENV: "production"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      minecraft:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
