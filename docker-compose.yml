services:
  minebot:
    build: .
    container_name: minebot
    environment:
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ACCESS_PASSWORD: "${ACCESS_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      MINECRAFT_HOST: "${MINECRAFT_HOST:-minecraft}"
      MINECRAFT_PORT: "${MINECRAFT_PORT:-25565}"
      BOT_USERNAME: "${BOT_USERNAME:-MineBot}"
      DB_PATH: "/app/data/minebot.sqlite"
      MEMORY_DIR: "/app/data/memories"
      NODE_ENV: "production"
    expose:
      - 3001
    volumes:
      - minebot-data:/app/data
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  minebot-data:

networks:
  dokploy-network:
    external: true
